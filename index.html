<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aqib Farid's professional resume — Project Ecologist, Botanist & Bush Regenerator">
    <title>Aqib Farid | Project Ecologist | Botanist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="scroll-progress" class="no-print"></div>

    <nav id="top-nav" class="no-print">
        <div class="nav-inner">
            <div class="nav-right">
                <button id="dark-toggle" title="Toggle dark mode">&#9680;</button>
                <button id="print-btn" onclick="window.print()">&#8595; Download CV</button>
            </div>
        </div>
    </nav>

    <div id="app">
        <header id="hero">
            <div class="hero-inner">
                <div class="hero-avatar" id="hero-avatar">AF</div>
                <div class="hero-badge" id="hero-role-badge"></div>
                <h1 id="hero-name">Aqib Farid</h1>
                <p id="hero-title" class="hero-title"></p>
                <p id="hero-tagline" class="hero-tagline"></p>
                <div id="hero-links" class="hero-links"></div>
            </div>
            <div class="hero-orb hero-orb-1"></div>
            <div class="hero-orb hero-orb-2"></div>
            <div class="hero-pattern"></div>
        </header>

        <div id="stats-row">
            <div id="stats-grid" class="stats-grid"></div>
        </div>

        <div id="layout">
            <aside id="sidebar">
                <div id="skills-card" class="card fade-in">
                    <h2 class="card-title">Skills</h2>
                    <div id="skills-content"></div>
                </div>
                <div id="education-card" class="card fade-in">
                    <h2 class="card-title">Education & Certifications</h2>
                    <div id="education-content"></div>
                </div>
                <div id="contact-card" class="card fade-in">
                    <h2 class="card-title">Contact</h2>
                    <div id="contact-content"></div>
                </div>
            </aside>

            <main id="main">
                <div id="summary-card" class="card fade-in">
                    <h2 class="card-title">Summary</h2>
                    <p id="summary-content"></p>
                </div>
                <div id="experience-card" class="card fade-in">
                    <h2 class="card-title">Experience</h2>
                    <div id="experience-content" class="timeline"></div>
                </div>
                <div id="projects-card" class="card fade-in">
                    <h2 class="card-title">Projects</h2>
                    <div id="projects-content" class="projects-grid"></div>
                </div>
            </main>
        </div>
    </div>

    <nav id="section-nav" class="no-print">
        <button class="section-dot" data-section="summary-card" title="Summary"></button>
        <button class="section-dot" data-section="experience-card" title="Experience"></button>
        <button class="section-dot" data-section="projects-card" title="Projects"></button>
    </nav>
    <button id="scroll-top-btn" class="no-print" title="Back to top">&#8679;</button>
    <div id="toast" class="no-print"></div>

    <script src="data/resumes-inline.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
