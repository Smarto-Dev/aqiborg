<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqib.org - Professional Resume</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="login-container" class="container">
        <h1>Welcome to Aqib.org</h1>
        <p>Your dynamic professional resume</p>
        <form id="login-form">
            <input type="password" id="password" placeholder="Enter access code" required>
            <button type="submit">Login</button>
        </form>
        <p id="login-error" class="error hidden"></p>
    </div>

    <div id="resume-container" class="container hidden">
        <header>
            <h1>Aqib</h1>
            <select id="profession-switcher">
                <option value="software-engineer">Software Engineer</option>
                <!-- More options added dynamically from JSON -->
            </select>
            <button id="logout">Logout</button>
        </header>

        <section id="resume-content">
            <!-- Dynamic resume content loaded here -->
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
